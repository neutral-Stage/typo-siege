<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TYPO SIEGE — Text Tower Defense</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #fafafa;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      overflow: hidden;
      user-select: none;
    }
    #game-wrapper {
      position: relative;
      width: 800px;
      height: 600px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 40px rgba(0,0,0,0.08);
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #hud {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      pointer-events: none;
      z-index: 10;
    }
    .hud-section {
      display: flex;
      gap: 16px;
      align-items: center;
    }
    .hud-item {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(8px);
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      color: #333;
      letter-spacing: -0.01em;
    }
    .hud-item .label {
      font-weight: 400;
      color: #999;
      margin-right: 4px;
    }
    #input-display {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      padding: 10px 28px;
      border-radius: 12px;
      font-size: 24px;
      font-weight: 500;
      color: #111;
      letter-spacing: 0.02em;
      min-width: 120px;
      text-align: center;
      z-index: 10;
      border: 2px solid transparent;
      transition: border-color 0.15s;
    }
    #input-display.active {
      border-color: #6366f1;
    }
    #input-display .cursor {
      display: inline-block;
      width: 2px;
      height: 24px;
      background: #6366f1;
      vertical-align: middle;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }
    #power-ups {
      position: absolute;
      bottom: 24px;
      right: 24px;
      display: flex;
      gap: 8px;
      z-index: 10;
    }
    .power-up {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      position: relative;
      cursor: pointer;
      border: 2px solid #e5e5e5;
      transition: all 0.2s;
    }
    .power-up.charged {
      border-color: #6366f1;
      box-shadow: 0 0 12px rgba(99,102,241,0.3);
    }
    .power-up .charge-bar {
      position: absolute;
      bottom: 2px;
      left: 4px;
      right: 4px;
      height: 3px;
      border-radius: 2px;
      background: #e5e5e5;
      overflow: hidden;
    }
    .power-up .charge-fill {
      height: 100%;
      background: #6366f1;
      border-radius: 2px;
      transition: width 0.3s;
    }
    .power-up .key-hint {
      font-size: 8px;
      font-weight: 700;
      color: #999;
      margin-top: 1px;
    }
    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(250,250,250,0.95);
      backdrop-filter: blur(20px);
      z-index: 20;
      transition: opacity 0.4s;
    }
    #overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #overlay h1 {
      font-size: 48px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: #111;
      margin-bottom: 8px;
    }
    #overlay .subtitle {
      font-size: 16px;
      color: #888;
      margin-bottom: 32px;
    }
    #overlay .final-score {
      font-size: 20px;
      color: #333;
      margin-bottom: 8px;
    }
    #start-btn {
      padding: 12px 32px;
      font-size: 16px;
      font-weight: 600;
      color: white;
      background: #111;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.15s, background 0.15s;
    }
    #start-btn:hover {
      transform: scale(1.04);
      background: #333;
    }
    #combo-display {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 20px;
      font-weight: 700;
      color: #6366f1;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 10;
      pointer-events: none;
    }
    #combo-display.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="game-wrapper">
    <canvas id="game-canvas"></canvas>
    
    <div id="hud">
      <div class="hud-section">
        <div class="hud-item"><span class="label">Score</span><span id="score-val">0</span></div>
        <div class="hud-item"><span class="label">Wave</span><span id="wave-val">1</span></div>
      </div>
      <div class="hud-section">
        <div class="hud-item" id="lives-display">❤️❤️❤️</div>
      </div>
    </div>

    <div id="combo-display">COMBO x1</div>

    <div id="input-display">
      <span id="typed-text"></span><span class="cursor"></span>
    </div>

    <div id="power-ups">
      <div class="power-up" id="pu-fire" title="Fireblast (1)">
        🔥
        <div class="charge-bar"><div class="charge-fill" style="width:0%"></div></div>
        <div class="key-hint">1</div>
      </div>
      <div class="power-up" id="pu-lightning" title="Lightning (2)">
        ⚡
        <div class="charge-bar"><div class="charge-fill" style="width:0%"></div></div>
        <div class="key-hint">2</div>
      </div>
      <div class="power-up" id="pu-shield" title="Shield (3)">
        🛡️
        <div class="charge-bar"><div class="charge-fill" style="width:0%"></div></div>
        <div class="key-hint">3</div>
      </div>
      <div class="power-up" id="pu-chain" title="Chain (4)">
        💥
        <div class="charge-bar"><div class="charge-fill" style="width:0%"></div></div>
        <div class="key-hint">4</div>
      </div>
    </div>

    <div id="overlay">
      <h1 id="overlay-title">TYPO SIEGE</h1>
      <div class="subtitle" id="overlay-subtitle">Type words. Charge towers. Defend the page.</div>
      <div class="final-score" id="overlay-stats" style="display:none"></div>
      <div id="new-highscore-badge" style="display:none; background:#6366f1; color:white; padding:6px 16px; border-radius:8px; font-size:13px; font-weight:700; margin-bottom:12px; letter-spacing:0.05em;">NEW HIGH SCORE</div>
      <div id="menu-highscore" style="font-size:14px; color:#aaa; margin-bottom:20px;"></div>
      <button id="start-btn">Start Game</button>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
