<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>TYPO SIEGE — Text Tower Defense</title>
  <meta name="description" content="A text tower defense game. Type falling words to destroy them. Charge power-ups. Survive the siege." />
  <meta property="og:title" content="TYPO SIEGE — Text Tower Defense" />
  <meta property="og:description" content="Type words. Charge towers. Defend the page." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://neutral-stage.github.io/typo-siege/" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏰</text></svg>" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f13;
      overflow: hidden;
      user-select: none;
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
    }
    #game-wrapper {
      position: fixed;
      inset: 0;
      overflow: hidden;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* ── HUD ── */
    #hud {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      pointer-events: none;
      z-index: 10;
    }
    .hud-section {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .hud-item {
      background: rgba(10,10,18,0.75);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.07);
      padding: 7px 16px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      color: #e8e8f5;
      letter-spacing: 0.01em;
    }
    .hud-item .label {
      font-weight: 400;
      color: rgba(255,255,255,0.3);
      margin-right: 6px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    #score-val {
      font-variant-numeric: tabular-nums;
      transition: color 0.12s;
    }
    #score-val.bump {
      color: #67e8f9;
    }
    #lives-display {
      background: rgba(10,10,18,0.75);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.07);
      padding: 7px 14px;
      border-radius: 10px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    /* ── Taunt ── */
    #taunt-display {
      position: absolute;
      top: 68px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 16px;
      font-weight: 700;
      color: #fbbf24;
      opacity: 0;
      z-index: 12;
      pointer-events: none;
      text-shadow: 0 0 16px rgba(251,191,36,0.5);
      transition: opacity 0.2s;
      white-space: nowrap;
      text-align: center;
    }
    #taunt-display.visible {
      opacity: 1;
    }

    /* ── Combo ── */
    #combo-display {
      position: absolute;
      top: 96px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 28px;
      font-weight: 900;
      color: #a5b4fc;
      opacity: 0;
      z-index: 10;
      pointer-events: none;
      letter-spacing: -0.02em;
      text-shadow: 0 0 24px rgba(165,180,252,0.65), 0 0 48px rgba(165,180,252,0.25);
      transition: opacity 0.12s;
      white-space: nowrap;
    }
    #combo-display.visible {
      opacity: 1;
    }

    /* ── Input display ── */
    #input-display {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(8,8,14,0.88);
      backdrop-filter: blur(16px);
      border: 1.5px solid rgba(255,255,255,0.07);
      padding: 10px 28px;
      border-radius: 14px;
      font-size: 22px;
      font-weight: 500;
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      color: #67e8f9;
      letter-spacing: 0.06em;
      min-width: 140px;
      text-align: center;
      z-index: 10;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    #input-display.active {
      border-color: rgba(103,232,249,0.35);
      box-shadow: 0 0 24px rgba(103,232,249,0.1);
    }
    #typed-text {
      color: #67e8f9;
    }
    #input-display .cursor {
      display: inline-block;
      width: 2px;
      height: 22px;
      background: #67e8f9;
      vertical-align: middle;
      margin-left: 2px;
      opacity: 0.8;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }

    /* ── Power-ups ── */
    #power-ups {
      position: absolute;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: row;
      gap: 10px;
      z-index: 10;
    }
    .power-up {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: rgba(8,8,16,0.82);
      backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      position: relative;
      cursor: pointer;
      border: 1.5px solid rgba(255,255,255,0.09);
      transition: border-color 0.2s, box-shadow 0.2s;
      overflow: hidden;
    }
    .power-up:hover {
      border-color: rgba(255,255,255,0.18);
    }
    .power-up.charged {
      border-color: rgba(99,102,241,0.75);
      box-shadow: 0 0 16px rgba(99,102,241,0.35), inset 0 0 14px rgba(99,102,241,0.1);
      animation: puPulse 1.6s ease-in-out infinite;
    }
    @keyframes puPulse {
      0%, 100% { box-shadow: 0 0 16px rgba(99,102,241,0.35), inset 0 0 14px rgba(99,102,241,0.1); }
      50%       { box-shadow: 0 0 30px rgba(99,102,241,0.65), inset 0 0 20px rgba(99,102,241,0.18); }
    }
    .power-up .charge-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: rgba(255,255,255,0.05);
    }
    .power-up .charge-fill {
      height: 100%;
      background: linear-gradient(90deg, #6366f1, #a5b4fc);
      border-radius: 0 2px 2px 0;
      transition: width 0.3s ease;
    }
    .power-up.charged .charge-fill {
      background: linear-gradient(90deg, #6366f1, #67e8f9);
    }
    .power-up .key-hint {
      font-size: 9px;
      font-weight: 700;
      color: rgba(255,255,255,0.3);
      margin-top: 2px;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.05em;
    }

    /* ── Boss warning ── */
    #boss-warning {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(28px, 6vw, 48px);
      font-weight: 900;
      color: #ef4444;
      text-shadow: 0 0 30px rgba(239,68,68,0.8), 0 0 60px rgba(239,68,68,0.4);
      z-index: 15;
      pointer-events: none;
      opacity: 0;
      animation: bossFlash 2s ease-out forwards;
    }
    @keyframes bossFlash {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
      20% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
      40% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      80% { opacity: 1; }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.2); }
    }

    /* ── Overlay ── */
    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(7,7,12,0.93);
      backdrop-filter: blur(28px);
      z-index: 20;
      transition: opacity 0.4s;
    }
    #overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #overlay h1 {
      font-size: clamp(52px, 8vw, 80px);
      font-weight: 900;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, #e8e8ff 0%, #a5b4fc 45%, #67e8f9 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
      line-height: 1;
    }
    #overlay .subtitle {
      font-size: 16px;
      color: rgba(255,255,255,0.32);
      margin-bottom: 20px;
      letter-spacing: 0.04em;
    }
    #overlay .final-score {
      font-size: 18px;
      color: rgba(255,255,255,0.45);
      margin-bottom: 10px;
      font-variant-numeric: tabular-nums;
      text-align: center;
      line-height: 1.8;
    }
    #overlay .final-score .big {
      display: block;
      font-size: 52px;
      font-weight: 900;
      color: #e8e8ff;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 6px;
    }
    #start-btn {
      padding: 14px 44px;
      font-size: 16px;
      font-weight: 700;
      color: #080810;
      background: linear-gradient(135deg, #a5b4fc, #67e8f9);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 24px rgba(103,232,249,0.22);
    }
    #start-btn:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 8px 36px rgba(103,232,249,0.38);
    }
    #start-btn:active {
      transform: scale(0.98);
    }
    #exit-btn {
      position: fixed;
      bottom: 16px;
      right: 16px;
      z-index: 50;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 700;
      color: rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    #exit-btn:hover {
      background: rgba(239,68,68,0.15);
      border-color: rgba(239,68,68,0.3);
      color: #fca5a5;
    }
    #exit-btn:active { transform: scale(0.95); }
    #new-highscore-badge {
      background: linear-gradient(135deg, #6366f1, #a5b4fc);
      color: white;
      padding: 6px 18px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 800;
      margin-bottom: 16px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      animation: badgePop 0.45s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes badgePop {
      from { transform: scale(0.4); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    #menu-highscore {
      font-size: 13px;
      color: rgba(255,255,255,0.25);
      margin-bottom: 12px;
      font-variant-numeric: tabular-nums;
    }

    /* ── Stats bar on menu ── */
    #menu-stats {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .stat-pill {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 5px 14px;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .stat-pill .stat-val {
      color: #67e8f9;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    /* ── Difficulty selector ── */
    #difficulty-selector {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
    }
    .diff-btn {
      padding: 6px 16px;
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.04em;
    }
    .diff-btn:hover {
      color: rgba(255,255,255,0.6);
      border-color: rgba(255,255,255,0.15);
    }
    .diff-btn.selected {
      color: #67e8f9;
      border-color: rgba(103,232,249,0.4);
      background: rgba(103,232,249,0.08);
    }

    /* ── Built by ── */
    #built-by {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: rgba(255,255,255,0.18);
      z-index: 21;
      pointer-events: auto;
      white-space: nowrap;
    }
    #built-by a {
      color: rgba(165,180,252,0.5);
      text-decoration: none;
      transition: color 0.15s;
    }
    #built-by a:hover {
      color: rgba(165,180,252,0.8);
    }

    /* ── Achievement toast ── */
    #achievement-toast {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      background: rgba(15,15,25,0.95);
      backdrop-filter: blur(20px);
      border: 1.5px solid rgba(251,191,36,0.4);
      border-radius: 14px;
      padding: 16px 28px;
      z-index: 25;
      opacity: 0;
      pointer-events: none;
      text-align: center;
      transition: opacity 0.3s, transform 0.3s;
      box-shadow: 0 0 40px rgba(251,191,36,0.15);
    }
    #achievement-toast.visible {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }
    #achievement-toast .ach-icon {
      font-size: 28px;
      margin-bottom: 6px;
    }
    #achievement-toast .ach-title {
      font-size: 14px;
      font-weight: 800;
      color: #fbbf24;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    #achievement-toast .ach-desc {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      margin-top: 4px;
    }

    /* ── Mobile / Tablet ── */
    #mobile-input {
      position: fixed;
      top: -100px;
      left: -100px;
      width: 1px;
      height: 1px;
      opacity: 0;
      font-size: 16px; /* prevents iOS zoom */
    }

    /* Tap-to-type hint */
    #tap-hint {
      position: absolute;
      bottom: 140px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(99,102,241,0.15);
      border: 1px solid rgba(99,102,241,0.3);
      backdrop-filter: blur(12px);
      padding: 10px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      color: #a5b4fc;
      z-index: 11;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      white-space: nowrap;
      animation: tapHintPulse 2s ease-in-out infinite;
    }
    #tap-hint.visible { opacity: 1; }
    @keyframes tapHintPulse {
      0%, 100% { transform: translateX(-50%) scale(1); }
      50% { transform: translateX(-50%) scale(1.04); }
    }

    /* Mobile game area — bottom safe zone for controls */
    #mobile-controls {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 10;
      pointer-events: none;
      display: none;
    }

    @media (max-width: 768px), (pointer: coarse) {
      body {
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
        touch-action: none;
        overscroll-behavior: none;
      }
      #game-wrapper {
        padding-top: env(safe-area-inset-top, 0px);
        padding-bottom: env(safe-area-inset-bottom, 0px);
      }

      /* Show tap hint */
      #tap-hint { display: block; }

      /* HUD compact */
      #hud { padding: 8px 10px; gap: 6px; }
      .hud-section { gap: 6px; }
      .hud-item { padding: 4px 10px; font-size: 13px; border-radius: 8px; }
      .hud-item .label { font-size: 8px; margin-right: 3px; }
      #lives-display { padding: 4px 8px; border-radius: 8px; font-size: 13px; gap: 3px; }

      /* Input display — above power-ups */
      #input-display {
        bottom: 90px;
        left: 12px;
        right: auto;
        transform: none;
        padding: 8px 16px;
        font-size: 18px;
        border-radius: 12px;
        min-width: 80px;
        max-width: 60vw;
      }
      #input-display .cursor { height: 18px; }

      /* Power-ups — bigger, bottom-left row */
      #power-ups {
        bottom: 14px;
        right: auto;
        left: 12px;
        gap: 8px;
      }
      .power-up {
        width: 56px;
        height: 56px;
        border-radius: 14px;
        font-size: 24px;
      }
      .power-up .key-hint { display: none; }
      .power-up .charge-bar { height: 3px; }
      .power-up .charge-fill { border-radius: 0 1px 1px 0; }

      /* Overlay */
      #overlay h1 { font-size: clamp(40px, 12vw, 64px); }
      #overlay .subtitle { font-size: 13px; padding: 0 20px; text-align: center; margin-bottom: 14px; }
      #start-btn { padding: 14px 40px; font-size: 16px; }
      #overlay .final-score .big { font-size: 44px; }
      #overlay .final-score { font-size: 14px; }
      #menu-highscore { font-size: 12px; }
      #menu-stats { gap: 6px; margin-bottom: 14px; }
      .stat-pill { padding: 4px 10px; font-size: 11px; }
      #difficulty-selector { gap: 6px; margin-bottom: 18px; }
      .diff-btn { padding: 8px 16px; font-size: 12px; }
      #built-by { font-size: 10px; bottom: 8px; }
      #achievement-toast { padding: 12px 20px; }
      #taunt-display { font-size: 14px; top: 56px; }
      #combo-display { font-size: 22px; top: 80px; }
    }

    @media (max-width: 480px) {
      .hud-item { padding: 3px 8px; font-size: 12px; }
      #input-display {
        bottom: 84px;
        padding: 6px 12px;
        font-size: 16px;
        max-width: 55vw;
      }
      .power-up { width: 50px; height: 50px; font-size: 22px; border-radius: 12px; }
      #overlay h1 { font-size: clamp(36px, 14vw, 52px); }
      #overlay .subtitle { font-size: 12px; }
      #start-btn { padding: 12px 32px; }
      #difficulty-selector { gap: 4px; }
      .diff-btn { padding: 6px 12px; font-size: 11px; }
    }

    @media (max-height: 500px) and (orientation: landscape) {
      #hud { padding: 4px 10px; }
      .hud-item { padding: 2px 8px; font-size: 11px; }
      #input-display { bottom: 56px; padding: 4px 12px; font-size: 14px; }
      #power-ups { bottom: 8px; gap: 4px; }
      .power-up { width: 42px; height: 42px; font-size: 18px; }
      #tap-hint { bottom: 110px; font-size: 12px; padding: 6px 16px; }
    }

    /* Large phone landscape */
    @media (max-width: 926px) and (orientation: landscape) and (max-height: 500px) {
      .power-up { width: 38px; height: 38px; font-size: 16px; }
      #input-display { bottom: 52px; font-size: 14px; }
    }
  </style>
</head>
<body>
  <div id="game-wrapper">
    <canvas id="game-canvas"></canvas>

    <div id="hud">
      <div class="hud-section">
        <div class="hud-item"><span class="label">Score</span><span id="score-val">0</span></div>
        <div class="hud-item"><span class="label">Wave</span><span id="wave-val">1</span></div>
      </div>
      <div class="hud-section">
        <div id="lives-display"></div>
      </div>
    </div>

    <div id="taunt-display"></div>
    <div id="combo-display"></div>

    <div id="tap-hint">👆 Tap anywhere to start typing</div>

    <div id="input-display">
      <span id="typed-text"></span><span class="cursor"></span>
    </div>

    <div id="power-ups">
      <div class="power-up" id="pu-fire" title="Fireblast (1)">
        🔥
        <div class="charge-bar"><div class="charge-fill" style="width:0%"></div></div>
        <div class="key-hint">1</div>
      </div>
      <div class="power-up" id="pu-lightning" title="Lightning (2)">
        ⚡
        <div class="charge-bar"><div class="charge-fill" style="width:0%"></div></div>
        <div class="key-hint">2</div>
      </div>
      <div class="power-up" id="pu-shield" title="Shield (3)">
        🛡️
        <div class="charge-bar"><div class="charge-fill" style="width:0%"></div></div>
        <div class="key-hint">3</div>
      </div>
      <div class="power-up" id="pu-chain" title="Chain (4)">
        💥
        <div class="charge-bar"><div class="charge-fill" style="width:0%"></div></div>
        <div class="key-hint">4</div>
      </div>
    </div>

    <div id="overlay">
      <h1 id="overlay-title">TYPO SIEGE</h1>
      <div class="subtitle" id="overlay-subtitle">Type words. Charge towers. Defend the page.</div>
      <div id="menu-stats">
        <div class="stat-pill">👀 <span class="stat-val" id="stat-visits">—</span> visits</div>
        <div class="stat-pill">🎮 <span class="stat-val" id="stat-totalgames">—</span> played</div>
        <div class="stat-pill">🏆 <span class="stat-val" id="stat-best">0</span> best</div>
        <div class="stat-pill">🔥 <span class="stat-val" id="stat-streak">0</span> streak</div>
        <div class="stat-pill">⚔️ <span class="stat-val" id="stat-words">0</span> words</div>
      </div>
      <div id="difficulty-selector">
        <button class="diff-btn" data-diff="easy">🟢 Easy</button>
        <button class="diff-btn selected" data-diff="normal">🟡 Normal</button>
        <button class="diff-btn" data-diff="hard">🔴 Hard</button>
      </div>
      <div class="final-score" id="overlay-stats" style="display:none"></div>
      <div id="new-highscore-badge" style="display:none">✦ NEW HIGH SCORE ✦</div>
      <div id="menu-highscore"></div>
