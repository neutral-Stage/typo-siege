<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TYPO SIEGE — Text Tower Defense</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f13;
      overflow: hidden;
      user-select: none;
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
    }
    #game-wrapper {
      position: fixed;
      inset: 0;
      overflow: hidden;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* ── HUD ── */
    #hud {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      pointer-events: none;
      z-index: 10;
    }
    .hud-section {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .hud-item {
      background: rgba(10,10,18,0.75);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.07);
      padding: 7px 16px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      color: #e8e8f5;
      letter-spacing: 0.01em;
    }
    .hud-item .label {
      font-weight: 400;
      color: rgba(255,255,255,0.3);
      margin-right: 6px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    #score-val {
      font-variant-numeric: tabular-nums;
      transition: color 0.12s;
    }
    #score-val.bump {
      color: #67e8f9;
    }
    #lives-display {
      background: rgba(10,10,18,0.75);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.07);
      padding: 7px 14px;
      border-radius: 10px;
      display: flex;
      gap: 5px;
      align-items: center;
    }
    .life-heart {
      width: 18px;
      height: 18px;
      transition: transform 0.2s, opacity 0.3s;
    }
    .life-heart.dead {
      opacity: 0.18;
      transform: scale(0.82);
    }

    /* ── Combo ── */
    #combo-display {
      position: absolute;
      top: 74px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 28px;
      font-weight: 900;
      color: #a5b4fc;
      opacity: 0;
      z-index: 10;
      pointer-events: none;
      letter-spacing: -0.02em;
      text-shadow: 0 0 24px rgba(165,180,252,0.65), 0 0 48px rgba(165,180,252,0.25);
      transition: opacity 0.12s;
      white-space: nowrap;
    }
    #combo-display.visible {
      opacity: 1;
    }

    /* ── Input display ── */
    #input-display {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(8,8,14,0.88);
      backdrop-filter: blur(16px);
      border: 1.5px solid rgba(255,255,255,0.07);
      padding: 10px 28px;
      border-radius: 14px;
      font-size: 22px;
      font-weight: 500;
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      color: #67e8f9;
      letter-spacing: 0.06em;
      min-width: 140px;
      text-align: center;
      z-index: 10;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    #input-display.active {
      border-color: rgba(103,232,249,0.35);
      box-shadow: 0 0 24px rgba(103,232,249,0.1);
    }
    #typed-text {
      color: #67e8f9;
    }
    #input-display .cursor {
      display: inline-block;
      width: 2px;
      height: 22px;
      background: #67e8f9;
      vertical-align: middle;
      margin-left: 2px;
      opacity: 0.8;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }

    /* ── Power-ups ── */
    #power-ups {
      position: absolute;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: row;
      gap: 10px;
      z-index: 10;
    }
    .power-up {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: rgba(8,8,16,0.82);
      backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      position: relative;
      cursor: pointer;
      border: 1.5px solid rgba(255,255,255,0.09);
      transition: border-color 0.2s, box-shadow 0.2s;
      overflow: hidden;
    }
    .power-up:hover {
      border-color: rgba(255,255,255,0.18);
    }
    .power-up.charged {
      border-color: rgba(99,102,241,0.75);
      box-shadow: 0 0 16px rgba(99,102,241,0.35), inset 0 0 14px rgba(99,102,241,0.1);
      animation: puPulse 1.6s ease-in-out infinite;
    }
    @keyframes puPulse {
      0%, 100% { box-shadow: 0 0 16px rgba(99,102,241,0.35), inset 0 0 14px rgba(99,102,241,0.1); }
      50%       { box-shadow: 0 0 30px rgba(99,102,241,0.65), inset 0 0 20px rgba(99,102,241,0.18); }
    }
    .power-up .charge-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: rgba(255,255,255,0.05);
    }
    .power-up .charge-fill {
      height: 100%;
      background: linear-gradient(90deg, #6366f1, #a5b4fc);
      border-radius: 0 2px 2px 0;
      transition: width 0.3s ease;
    }
    .power-up.charged .charge-fill {
      background: linear-gradient(90deg, #6366f1, #67e8f9);
    }
    .power-up .key-hint {
      font-size: 9px;
      font-weight: 700;
      color: rgba(255,255,255,0.3);
      margin-top: 2px;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.05em;
    }

    /* ── Overlay ── */
    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(7,7,12,0.93);
      backdrop-filter: blur(28px);
      z-index: 20;
      transition: opacity 0.4s;
    }
    #overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #overlay h1 {
      font-size: clamp(52px, 8vw, 80px);
      font-weight: 900;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, #e8e8ff 0%, #a5b4fc 45%, #67e8f9 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
      line-height: 1;
    }
    #overlay .subtitle {
      font-size: 16px;
      color: rgba(255,255,255,0.32);
      margin-bottom: 40px;
      letter-spacing: 0.04em;
    }
    #overlay .final-score {
      font-size: 18px;
      color: rgba(255,255,255,0.45);
      margin-bottom: 10px;
      font-variant-numeric: tabular-nums;
      text-align: center;
      line-height: 1.8;
    }
    #overlay .final-score .big {
      display: block;
      font-size: 52px;
      font-weight: 900;
      color: #e8e8ff;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 6px;
    }
    #start-btn {
      padding: 14px 44px;
      font-size: 16px;
      font-weight: 700;
      color: #080810;
      background: linear-gradient(135deg, #a5b4fc, #67e8f9);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 24px rgba(103,232,249,0.22);
    }
    #start-btn:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 8px 36px rgba(103,232,249,0.38);
    }
    #start-btn:active {
      transform: scale(0.98);
    }
    #new-highscore-badge {
      background: linear-gradient(135deg, #6366f1, #a5b4fc);
      color: white;
      padding: 6px 18px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 800;
      margin-bottom: 16px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      animation: badgePop 0.45s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes badgePop {
      from { transform: scale(0.4); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    #menu-highscore {
      font-size: 13px;
      color: rgba(255,255,255,0.25);
      margin-bottom: 26px;
      font-variant-numeric: tabular-nums;
    }

    /* ── Mobile / Tablet ── */
    #mobile-input {
      position: fixed;
      top: -100px;
      left: -100px;
      width: 1px;
      height: 1px;
      opacity: 0;
      font-size: 16px; /* prevents iOS zoom */
    }

    @media (max-width: 768px) {
      #hud {
        padding: 10px 12px;
      }
      .hud-item {
        padding: 5px 10px;
        font-size: 13px;
        border-radius: 8px;
      }
      .hud-item .label {
        font-size: 8px;
        margin-right: 4px;
      }
      #lives-display {
        padding: 5px 10px;
        border-radius: 8px;
        font-size: 14px;
      }
      #input-display {
        bottom: 90px;
        padding: 8px 18px;
        font-size: 18px;
        border-radius: 12px;
        min-width: 100px;
      }
      #input-display .cursor {
        height: 18px;
      }
      #power-ups {
        bottom: 16px;
        right: 12px;
        gap: 6px;
      }
      .power-up {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        font-size: 20px;
      }
      .power-up .key-hint {
        display: none; /* hide key hints on mobile */
      }
      #overlay h1 {
        font-size: clamp(40px, 12vw, 64px);
      }
      #overlay .subtitle {
        font-size: 13px;
        padding: 0 24px;
        text-align: center;
        margin-bottom: 28px;
      }
      #start-btn {
        padding: 12px 36px;
        font-size: 15px;
      }
      #overlay .final-score .big {
        font-size: 40px;
      }
      #overlay .final-score {
        font-size: 15px;
      }
      #menu-highscore {
        font-size: 12px;
        margin-bottom: 20px;
      }
    }

    @media (max-width: 480px) {
      .hud-item {
        padding: 4px 8px;
        font-size: 12px;
      }
      .hud-item .label {
        font-size: 7px;
      }
      #input-display {
        bottom: 80px;
        padding: 6px 14px;
        font-size: 16px;
        min-width: 80px;
      }
      .power-up {
        width: 42px;
        height: 42px;
        font-size: 18px;
        border-radius: 10px;
      }
      #overlay h1 {
        font-size: clamp(36px, 14vw, 52px);
      }
      #overlay .subtitle {
        font-size: 12px;
      }
    }

    /* Landscape phones */
    @media (max-height: 500px) {
      #hud {
        padding: 6px 12px;
      }
      .hud-item {
        padding: 3px 8px;
        font-size: 11px;
      }
      #input-display {
        bottom: 60px;
        padding: 5px 12px;
        font-size: 14px;
      }
      #power-ups {
        bottom: 10px;
        gap: 4px;
      }
      .power-up {
        width: 38px;
        height: 38px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div id="game-wrapper">
    <canvas id="game-canvas"></canvas>

    <div id="hud">
      <div class="hud-section">
        <div class="hud-item"><span class="label">Score</span><span id="score-val">0</span></div>
        <div class="hud-item"><span class="label">Wave</span><span id="wave-val">1</span></div>
      </div>
      <div class="hud-section">
        <div id="lives-display"></div>
      </div>
    </div>

    <div id="combo-display"></div>

    <div id="input-display">
      <span id="typed-text"></span><span class="cursor"></span>
    </div>

    <div id="power-ups">
      <div class="power-up" id="pu-fire" title="Fireblast (1)">
        🔥
        <div class="charge-bar"><div class="charge-fill" style="width:0%"></div></div>
        <div class="key-hint">1</div>
      </div>
      <div class="power-up" id="pu-lightning" title="Lightning (2)">
        ⚡
        <div class="charge-bar"><div class="charge-fill" style="width:0%"></div></div>
        <div class="key-hint">2</div>
      </div>
      <div class="power-up" id="pu-shield" title="Shield (3)">
        🛡️
        <div class="charge-bar"><div class="charge-fill" style="width:0%"></div></div>
        <div class="key-hint">3</div>
      </div>
      <div class="power-up" id="pu-chain" title="Chain (4)">
        💥
        <div class="charge-bar"><div class="charge-fill" style="width:0%"></div></div>
        <div class="key-hint">4</div>
      </div>
    </div>

    <div id="overlay">
      <h1 id="overlay-title">TYPO SIEGE</h1>
      <div class="subtitle" id="overlay-subtitle">Type words. Charge towers. Defend the page.</div>
      <div class="final-score" id="overlay-stats" style="display:none"></div>
      <div id="new-highscore-badge" style="display:none">✦ NEW HIGH SCORE ✦</div>
      <div id="menu-highscore"></div>
      <button id="start-btn">Start Game</button>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
  <input id="mobile-input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
</body>
</html>
